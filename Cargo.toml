[package]
name = "articuelate"
version = "0.1.0"
edition = "2024"
description = "A modern, cross-platform, open-source audio cue system for professional live show control"
authors = ["H3mul"]

[dependencies]
eframe = "0.31"
egui = "0.31"
egui_extras = "0.31"
egui_dock = "0.16"
catppuccin-egui = { version = "5.7.0", default-features = false, features = ["egui31"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
kira = "0.12"
