version: "3"

tasks:
  default:
    desc: Build the Tauri app for the current platform
    cmds:
      - node scripts/tauri.mjs build

  # --- Tauri (full app) ---
  # Runs from the repo root (where tauri.conf.json lives) via scripts/tauri.mjs.
  tauri:dev:
    desc: Run the Tauri dev app (Rust + WebView)
    cmds:
      - node scripts/tauri.mjs dev

  tauri:build:
    desc: Build the bundled Tauri app
    cmds:
      - node scripts/tauri.mjs build

  # --- Frontend only (fast layout iteration, no Rust compile) ---
  frontend:dev:
    desc: Run the Vite dev server against mock data
    cmds:
      - npm --prefix ui run dev

  frontend:build:
    desc: Build the frontend bundle into ui/dist
    cmds:
      - npm --prefix ui run build

  # --- Rust core ---
  check:
    desc: Run cargo check on the Rust core
    cmds:
      - cargo check

  build:release:
    desc: Build the Tauri app in release mode
    cmds:
      - node scripts/tauri.mjs build --release

  icons:
    desc: Regenerate placeholder app icons
    cmds:
      - node scripts/gen_icons.mjs
