version: "3"

tasks:
  default:
    desc: Run the default dev command
    deps:
      - dev

  run:
    desc: Run the Tauri app
    dir: crates/app-desktop
    cmds:
      - cargo run

  dev:
    desc: Main dev command - start app and dev server
    deps:
      - run
      - frontend:dev

  tauri:build:
    desc: Build the bundled Tauri app
    cmds:
      - npm --prefix crates/app-desktop run tauri:build

  frontend:dev:
    desc: Run the Vite dev server against mock data
    cmds:
      - npm --prefix crates/app-desktop run dev

  frontend:build:
    desc: Build the frontend bundle into crates/app-desktop/dist
    cmds:
      - npm --prefix crates/app-desktop run build

  check:
    desc: Run cargo check on the whole workspace
    cmds:
      - cargo check

  icons:
    desc: Regenerate placeholder app icons
    cmds:
      - node scripts/gen_icons.mjs
