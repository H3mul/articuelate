# Articuelate colour theme

[font.mono_sm]
font_family = "JetBrains Mono"
font_weight = "regular"
font_size = 11
line_height = 14

[font.mono_xl]
font_family = "JetBrains Mono"
font_weight = "bold"
font_size = 24
line_height = 30

[font.heading]
font_family = "Segoe UI"
font_weight = "semibold"
font_size = 15 
line_height = 20 

[font.body_bold]
font_family = "Segoe UI"
font_weight = "medium"
font_size = 13
line_height = 18 

[font.body]
font_family = "Segoe UI"
font_weight = "regular"
font_size = 13
line_height = 18 

[color]

# Deepest base canvas background (window background).
bg_app = "#181926"
# Primary pane panels (Cuelist background, Inspector background).
bg_surface = "#1e2030"
# Primary pane panel alternation (Cuelist background rows)
bg_surface_odd = "#24273a"
# Hover states, active tab backgrounds, secondary buttons.
bg_hover = "#363a4f"
# Input controls, table headers, inactive rows, cards.
bg_overlay = "#494d64"

# Standard divider for table rows and pane borders.
border_subtle = "#6e738d"
# Focused input borders, active tab indicators.
border_focus = "#8087a2"

# High-contrast body, cue titles, times. Primary legibility.
text_primary = "#cad3f5"
# Column headers, cue numbers, inactive tabs, unit labels (sec, dB).
text_secondary = "#b8c0e0"
# Disabled cues, muted parameters.
text_disabled = "#a5adcb"

# Active Playhead / Selected Target (Cyan Blue).
status_active = "#8aadf4"
# Active Playing Cue (Green glow/bar).
status_status_running = "#a6da95"
# Pre-Wait / Post-Wait Active (Amber).
status_wait = "#eed49f"
# Broken Cue / Panic Trigger (Red).
status_error = "#ee99a0"
# Armed / Standby State (Purple).
status_standby = "#c6a0f6"

[dim]
space_xs = 4.0
space_sm = 8.0
space_md = 12.0
space_lg = 16.0
space_xl = 24.0
height_cue_row = 24.0
