# Articuelate colour theme (Zed-inspired, Macchiato-based)

[font.mono_sm]
family = "JetBrains Mono"
weight = "regular"
size = 11.0
line_height = 14.0

[font.mono_xl]
family = "JetBrains Mono"
weight = "bold"
size = 24.0
line_height = 30.0

[font.heading]
family = "Segoe UI"
weight = "semibold"
size = 15.0
line_height = 20.0

[font.body_bold]
family = "Segoe UI"
weight = "medium"
size = 13.0
line_height = 18.0

[font.body]
family = "Segoe UI"
weight = "regular"
size = 13.0
line_height = 18.0

[dim]

space_xs = 4.0
space_sm = 8.0
space_md = 12.0
space_lg = 16.0
space_xl = 24.0

height_cue_row = 24.0
min_panel_size = 225.0
border_size = 1.0

status_bar_height = 24.0
status_icon_size = 14.0
toolbar_height = 36.0

radius_sm = 3.0
radius_md = 5.0 # For buttons and inputs

[color]

# --- Environment & Surfaces (Dark to Light) ---
bg_app              = "#181926"  # Base canvas; window background; separator gutters
bg_surface          = "#1E2030"  # Primary panel surfaces (Main Cuelist, Active Cues panel)
bg_surface_raised   = "#24273A"  # Slightly elevated surfaces; row zebra-striping (even rows)
bg_surface_overlay  = "#363A4F"  # Popovers, floating menus, high-elevation surfaces

# --- Interactable "Punch-Down" Elements (Darker than Surface) ---
# Used for buttons, inputs, and controls resting on bg_surface
element_bg          = "#11121C"  # Default interactable (Darker than bg_app to punch down)
element_border      = "#363A4F"  # Border to define the element shape
element_bg_hover    = "#181926"  # Hover state (Lifts slightly towards app bg)
element_bg_active   = "#090A0F"  # Pressed/Active state (Deepest inset)

# --- Selection & Focus ---
bg_selection        = "#2F3C5E"  # Background for selected cue row (Subtle blue tint, replaces zebra)
bg_selection_active = "#405382"  # Background for selected AND focused cue row
border_focus        = "#8AADF4"  # Focus ring color (Macchiato Blue)

# --- Text & Typography ---
text_primary        = "#CAD3F5"  # High-contrast body, cue titles, times
text_secondary      = "#B8C0E0"  # Column headers, cue numbers, inactive tabs, unit labels
text_disabled       = "#A5ADCB"  # Disabled cues, muted parameters, placeholders

# --- Status & Semantic Colors (Macchiato Palette) ---
status_playhead     = "#8AADF4"  # Active Playhead indicator / Selection highlight (Blue)
status_running      = "#A6DA95"  # Active Playing Cue background tint / green glow (Green)
status_wait         = "#EED49F"  # Pre-Wait / Post-Wait Active (Yellow/Amber)
status_error        = "#EE99A0"  # Broken Cue / Panic Trigger (Red)
status_standby      = "#C6A0F6"  # Armed / Standby State (Mauve)
status_group        = "#F5A97F"  # Group cue indicator border (Peach - matching orange box in image)

# --- Structural Elements ---
border_subtle       = "#181926"  # Same as bg_app; used to separate panels (creates 'gutters')
border_divider      = "#363A4F"  # Internal dividers within panels (e.g., column separators, header border)
