# Articuelate colour theme

[font.mono_sm]
family = "JetBrains Mono"
weight = "regular"
size = 11.0
line_height = 14.0

[font.mono_xl]
family = "JetBrains Mono"
weight = "bold"
size = 24.0
line_height = 30.0

[font.heading]
family = "Segoe UI"
weight = "semibold"
size = 15.0
line_height = 20.0

[font.body_bold]
family = "Segoe UI"
weight = "medium"
size = 13.0
line_height = 18.0

[font.body]
family = "Segoe UI"
weight = "regular"
size = 13.0
line_height = 18.0

[dim]

space_xs = 4.0
space_sm = 8.0
space_md = 12.0
space_lg = 16.0
space_xl = 24.0

height_cue_row = 24.0
min_panel_size = 225.0
border_size = 1.0

status_bar_height = 24.0
status_icon_size = 14.0

radius_sm = 3.0

[color]

bg_app              = "#181926"  # Window canvas & deepest inset wells
bg_surface          = "#1E2030"  # Primary panels (Cuelist, Inspector background)
bg_surface_odd      = "#24273A"  # Striped table rows / secondary surface contrast

bg_hover            = "#363a4f" # Hover states, active tab backgrounds, secondary buttons.
bg_overlay          = "#494d64" # Input controls, table headers, inactive rows, cards.

# --- Inset Interactable Foundations ("Punch-Down") ---
element_bg            = "#141520"  # Standard button/input default background (Darker than panel!)
element_border        = "#2B2D42"  # Subtle 1px frame to hold shape against bg_surface
element_bg_hover      = "#282A40"  # Hover: Lifts toward panel lightness
element_bg_active     = "#0E0F18"  # Active/Pressed: Insets deeper into darks

# --- Accent & Status Focus Overlay ---
border_focus          = "#8087A2"  # Focused element ring
accent_active         = "#00A3FF"  # Playhead / Selection highlight
border_subtle         = "#6e738d" # Standard divider for table rows and pane borders.

# High-contrast body, cue titles, times. Primary legibility.
text_primary = "#cad3f5"
# Column headers, cue numbers, inactive tabs, unit labels (sec, dB).
text_secondary = "#b8c0e0"
# Disabled cues, muted parameters.
text_disabled = "#a5adcb"

# Active Playhead / Selected Target (Cyan Blue).
status_active = "#8aadf4"
# Active Playing Cue (Green glow/bar).
status_status_running = "#a6da95"
# Pre-Wait / Post-Wait Active (Amber).
status_wait = "#eed49f"
# Broken Cue / Panic Trigger (Red).
status_error = "#ee99a0"
# Armed / Standby State (Purple).
status_standby = "#c6a0f6"
